      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="mark" x1="80" y1="80" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
