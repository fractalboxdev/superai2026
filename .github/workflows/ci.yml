name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- toolchains ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      # --- Rust: fmt, clippy, build (the binary the acceptance suite drives), test ---
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build -p sync
      - run: cargo test -p sync

      # --- JS: typecheck, test (protocol unit + acceptance e2e), build ---
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
